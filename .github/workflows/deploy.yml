name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'phd/pre-experimental-result/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phd/pre-experimental-result
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Slidev
        run: npm run build

      - name: Prepare deployment folder
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p deploy/phd/pre-experimental-result
          cp -r phd/pre-experimental-result/dist/* deploy/phd/pre-experimental-result/
          # Optional: create root index.html that links to slides
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>Presentations</title>
          <style>body{font-family:system-ui;background:#0f172a;color:#e2e8f0;padding:3rem;max-width:600px;margin:auto}
          a{color:#34d399;text-decoration:none}h1{color:#fff}.card{background:#1e293b;padding:1rem 1.5rem;border-radius:8px;margin:1rem 0;border-left:4px solid #34d399}</style>
          </head><body>
          <h1>📊 Presentations</h1>
          <div class="card"><a href="phd/pre-experimental-result/">PhD · Pre-Experimental Result</a></div>
          </body></html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
